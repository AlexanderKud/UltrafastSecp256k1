name: Formal Verification (Z3 SMT)

on:
  push:
    branches: [dev, main]
    paths:
      - 'cpu/src/ct_field.cpp'
      - 'audit/formal/**'
  pull_request:
    paths:
      - 'cpu/src/ct_field.cpp'
      - 'audit/formal/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formal-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  z3-safegcd:
    name: SafeGCD Z3 SMT Proofs
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Z3 solver
        run: pip install z3-solver

      - name: Run SafeGCD formal proofs
        run: python3 audit/formal/safegcd_z3_proof.py

      - name: Append proof summary
        if: always()
        run: |
          echo '## Formal Verification — SafeGCD Z3 SMT' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python3 audit/formal/safegcd_z3_proof.py 2>&1 | tail -5 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
